name: ⬇️ 1-Download from url

on:
  workflow_dispatch:
    inputs:
      urls:
        description: 'URLs to download (space-separated). Supports YouTube, direct files, etc.'
        required: true
      mode:
        description: 'Download mode: normal or zip'
        default: 'normal'
      split_threshold_mb:
        description: 'Max file size in MB before splitting (0 = no split)'
        default: '90'
      youtube_quality:
        description: 'YouTube quality: best, 1080p, 720p, 480p, audio-only'
        default: 'best'

jobs:
  download:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Install yt-dlp, aria2, zip and ffmpeg
        run: |
          sudo apt-get update
          sudo apt-get install -y aria2 zip ffmpeg
          sudo wget https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp -O /usr/local/bin/yt-dlp
          sudo chmod a+rx /usr/local/bin/yt-dlp
          echo "✅ Installed: aria2, zip, ffmpeg, yt-dlp"
      
      - name: Download files
        run: |
          MODE="${{ inputs.mode }}"
          URLS="${{ inputs.urls }}"
          SPLIT_THRESHOLD_MB="${{ inputs.split_threshold_mb }}"
          QUALITY="${{ inputs.youtube_quality }}"
          
          SPLIT_THRESHOLD_BYTES=$((SPLIT_THRESHOLD_MB * 1024 * 1024))
          
          mkdir -p downloads tmp_downloads
          
          echo "🚀 Starting downloads..."
          echo "Mode: $MODE"
          echo "Split threshold: $SPLIT_THRESHOLD_MB MB"
          echo "YouTube quality: $QUALITY"
          
          # Download each URL
          for URL in $URLS; do
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            
            # Check if URL is YouTube
            if [[ "$URL" =~ (youtube\.com|youtu\.be) ]]; then
              echo "📺 Detected YouTube URL: $URL"
              
              # Set format based on quality
              case "$QUALITY" in
                "1080p")
                  FORMAT="bestvideo[height<=1080]+bestaudio/best[height<=1080]"
                  ;;
                "720p")
                  FORMAT="bestvideo[height<=720]+bestaudio/best[height<=720]"
                  ;;
                "480p")
                  FORMAT="bestvideo[height<=480]+bestaudio/best[height<=480]"
                  ;;
                "audio-only")
                  FORMAT="bestaudio/best"
                  ;;
                *)
                  FORMAT="bestvideo+bestaudio/best"
                  ;;
              esac
              
              echo "Format: $FORMAT"
              
              # Download with yt-dlp
              yt-dlp -f "$FORMAT" \
                --merge-output-format mp4 \
                -o "tmp_downloads/%(title)s.%(ext)s" \
                --no-playlist \
                "$URL"
              
              echo "✅ YouTube download completed"
              
            else
              echo "📥 Detected direct file URL: $URL"
              FILENAME=$(basename "$URL" | cut -d'?' -f1)
              
              # Download with aria2c
              aria2c --split=2 \
                --max-connection-per-server=2 \
                --min-split-size=90M \
                --continue=true \
                --dir="tmp_downloads" \
                --out="$FILENAME" \
                "$URL"
              
              echo "✅ File download completed"
            fi
          done
          
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "📦 Processing downloaded files..."
          
          # Process files based on mode
          if [ "$MODE" = "zip" ]; then
            echo "🧩 Zipping all files together..."
            zip -j "downloads/archive_$(date +%Y%m%d_%H%M%S).zip" tmp_downloads/* >/dev/null
            rm -rf tmp_downloads
          else
            for file in tmp_downloads/*; do
              [ -f "$file" ] || continue
              size=$(stat -c%s "$file")
              name=$(basename "$file")
              
