name: Cobalt YouTube Downloader

on:
  workflow_dispatch:
    inputs:
      video_url:
        description: 'لینک ویدیوی یوتیوب را اینجا وارد کنید'
        required: true
        type: string

jobs:
  download_video:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Get Direct Link from Cobalt API
        id: api_call
        run: |
          echo "درخواست لینک مستقیم از Cobalt..."
          
          # ارسال درخواست به API
          RESPONSE=$(curl -s -X POST "https://api.cobalt.tools/api/json" \
            -H "Accept: application/json" \
            -H "Content-Type: application/json" \
            -d '{"url": "${{ github.event.inputs.video_url }}"}')
          
          # استخراج لینک دانلود از جواب سرور با استفاده از jq
          DOWNLOAD_URL=$(echo $RESPONSE | jq -r '.url')
          
          if [ "$DOWNLOAD_URL" == "null" ] || [ -z "$DOWNLOAD_URL" ]; then
            echo "❌ خطا در دریافت لینک. پاسخ سرور:"
            echo $RESPONSE
            exit 1
          fi
          
          echo "لینک دریافت شد!"
          echo "DOWNLOAD_URL=$DOWNLOAD_URL" >> $GITHUB_ENV

      - name: Download the Video
        run: |
          echo "در حال دانلود فایل..."
          # دانلود ویدیو با لینک مستقیم
          wget -O downloaded_video.mp4 "${{ env.DOWNLOAD_URL }}"

      - name: Upload Video as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: YouTube-Video
          path: downloaded_video.mp4
